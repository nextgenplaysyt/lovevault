<!DOCTYPE html>
<html>
<head>
  <title>Home</title>

  <!-- Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="navbar">

  <div class="nav-left">💎 LoveVault</div>

  <div class="nav-right">
    <span class="nav-link" onclick="goTo('home.html')">Home</span>
    <span class="nav-link" onclick="goTo('message.html')">Messages</span>
    <span class="nav-link" onclick="goTo('game.html')">Game</span>
    <span class="nav-link" onclick="goTo('rewards.html')">Rewards</span>
    <button onclick="logout()">🚪</button>
  </div>

</div>

<main>

  <div class="card nav" onclick="goTo('message.html')">
    💌 Messages
  </div>

  <div class="card nav" onclick="goTo('game.html')">
    🎮 Game
  </div>

  <div class="card nav" onclick="goTo('rewards.html')">
    🎁 Rewards
  </div>

</main>

<script>
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
  }
});
</script>

<script>
const links = document.querySelectorAll(".nav-link");

links.forEach(link => {
  if (window.location.href.includes(link.getAttribute("onclick").split("'")[1])) {
    link.classList.add("active");
  }
});
</script>

<!-- JS -->
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="./firebase.js"></script>
<script src="./app.js"></script>

<script>
document.body.style.display = "none";

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
  }
});
</script>

</body>
</html>
