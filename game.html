<!DOCTYPE html>
<html>
<head>
  <title>Game</title>

  <!-- Mobile support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="navbar">

  <div class="nav-left">💎 LoveVault</div>

  <div class="nav-right">
    <span class="nav-link" onclick="goTo('home.html')">Home</span>
    <span class="nav-link" onclick="goTo('message.html')">Messages</span>
    <span class="nav-link" onclick="goTo('game.html')">Game</span>
    <span class="nav-link" onclick="goTo('rewards.html')">Rewards</span>
    <button onclick="logout()">🚪</button>
  </div>

</div>

<main>

  <div class="card center">
    <canvas id="gameCanvas"></canvas>

    <h3>Score: <span id="score">0</span></h3>

    <button onclick="startGame()">Start Game</button>
  </div>

</main>

<script>
document.body.style.display = "none";

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
  }
});
</script>

<!-- JS -->
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- Your Firebase config -->
<script src="./firebase.js"></script>

<!-- Your app -->
<script src="./app.js"></script>

</body>
</html>
