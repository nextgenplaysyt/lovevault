<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="navbar">

  <div class="nav-left">🛠 Admin Panel</div>

  <div class="nav-right">
    <span class="nav-link" onclick="goTo('admin.html')">Dashboard</span>
    <span class="nav-link" onclick="goTo('admin-messages.html')">Messages</span>
    <span class="nav-link" onclick="goTo('admin-requests.html')">Requests</span>
    <button onclick="logout()">🚪</button>
  </div>

</div>

<main>

<div class="card nav" onclick="goTo('admin-messages.html')">
  📅 Daily Messages
</div>

<div class="card nav" onclick="goTo('admin-requests.html')">
  📩 Requests
</div>

<!-- 🔒 Registration Control -->
<div class="card">
  <h3>🔒 Registration Control</h3>

  <p id="regStatus">Status: Loading...</p>

  <label class="switch">
    <input type="checkbox" id="regToggle" onchange="toggleRegistrationSwitch()">
    <span class="slider"></span>
  </label>

</div>

</main>

<script>
const links = document.querySelectorAll(".nav-link");

links.forEach(link => {
  if (window.location.href.includes(link.getAttribute("onclick").split("'")[1])) {
    link.classList.add("active");
  }
});
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="./firebase.js"></script>
<script src="./app.js"></script>

<!-- 🔐 ADMIN PROTECTION (NO FLICKER) -->
<script>
document.body.style.display = "none";

auth.onAuthStateChanged(user => {
  if (!user || user.email.trim().toLowerCase() !== "nextgenplaysyt@gmail.com") {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
  }
});
</script>

</body>
</html>
