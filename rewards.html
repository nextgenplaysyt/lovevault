<!DOCTYPE html>
<html>
<head>
  <title>Rewards</title>

  <!-- Mobile support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="navbar">

  <div class="nav-left">💎 LoveVault</div>

  <div class="nav-right">
    <span class="nav-link" onclick="goTo('home.html')">Home</span>
    <span class="nav-link" onclick="goTo('message.html')">Messages</span>
    <span class="nav-link" onclick="goTo('game.html')">Game</span>
    <span class="nav-link" onclick="goTo('rewards.html')">Rewards</span>
    <button onclick="logout()">🚪</button>
  </div>

</div>

<main>

  <!-- Request Form -->
  <div class="card">
    <h3>Request a Reward 💌</h3>

    <input id="reqName" placeholder="What do you want?">
    <input id="reqCost" type="number" placeholder="How many coins?">

    <button onclick="sendRequest()">Send Request</button>
  </div>

  <!-- Requests List -->
  <div class="card">
    <h3>Your Requests</h3>

    <div id="userRequests">
      <p style="opacity:0.6;">No requests yet...</p>
    </div>
  </div>

</main>

<script>
document.body.style.display = "none";

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
  }
});
</script>

<script>
const links = document.querySelectorAll(".nav-link");

links.forEach(link => {
  if (window.location.href.includes(link.getAttribute("onclick").split("'")[1])) {
    link.classList.add("active");
  }
});
</script>

<!-- JS -->
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="./firebase.js"></script>
<script src="./app.js"></script>
</body>
</html>
