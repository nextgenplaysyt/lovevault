<!DOCTYPE html>
<html>
<head>
  <title>Requests</title>

  <!-- Mobile support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="navbar">

  <div class="nav-left">🛠 Admin Panel</div>

  <div class="nav-right">
    <span class="nav-link" onclick="goTo('admin.html')">Dashboard</span>
    <span class="nav-link" onclick="goTo('admin-messages.html')">Messages</span>
    <span class="nav-link" onclick="goTo('admin-requests.html')">Requests</span>
    <button onclick="logout()">🚪</button>
  </div>

</div>

<main>

  <div class="card">
    <h3>All Requests</h3>

    <div id="adminRequests">
      <p style="opacity:0.6;">No requests yet...</p>
    </div>
  </div>

</main>

<script>
document.body.style.display = "none";

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
  }
});
</script>

<script>
const links = document.querySelectorAll(".nav-link");

links.forEach(link => {
  if (window.location.href.includes(link.getAttribute("onclick").split("'")[1])) {
    link.classList.add("active");
  }
});
</script>

<!-- JS -->
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- Your Firebase config -->
<script src="./firebase.js"></script>

<!-- Your app -->
<script src="./app.js"></script>

</body>
</html>
