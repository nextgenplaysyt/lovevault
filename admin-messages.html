<!DOCTYPE html>
<html>
<head>
  <title>Daily Messages</title>

  <!-- Mobile support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<header>
  <button onclick="goTo('admin.html')">⬅ Back</button>
  <h1>📅 Daily Messages</h1>
</header>

<main>

  <!-- Create Message -->
  <div class="card">
    <h3>Create / Edit Message</h3>

    <input type="date" id="msgDate">

    <textarea id="msgText" placeholder="Write your message here..."></textarea>

    <label style="opacity:0.7;">Optional Image</label>
    <input type="file" id="msgImage">

    <button onclick="saveDailyMessage()">Save Message</button>

    <p id="msgStatus"></p>
  </div>

  <!-- Saved Messages -->
  <div class="card">
    <h3>Saved Messages</h3>

    <div id="savedMessages">
      <p style="opacity:0.6;">No messages yet...</p>
    </div>
  </div>

</main>

<!-- JS -->
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Your Firebase config -->
<script src="./firebase.js"></script>

<!-- Your app -->
<script src="./app.js"></script>

</body>
</html>
